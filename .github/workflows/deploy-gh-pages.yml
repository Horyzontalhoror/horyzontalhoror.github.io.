name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # 💡 CHANGED: Automatically cancels older runs to prevent duplicate artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # 💡 UPDATED: Node 18 is EOL; Node 22/24 prevents compatibility issues with upload v4
          cache: 'npm'     # 💡 BONUS: Speeds up your build
      - name: Install dependencies
        run: npm ci        # 💡 BONUS: 'npm ci' is cleaner and faster for CI/CD than 'npm install'
      - name: Build Eleventy
        run: npx @11ty/eleventy
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4